name: Archive TfL status

on:
  schedule:
    # Every 15 minutes. GitHub cron isn't second-accurate and can lag under
    # load, but it's free and good enough to start the moat.
    - cron: "*/15 * * * *"
  workflow_dispatch: {} # lets you trigger a run by hand to test

concurrency:
  group: archive
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - name: Poll TfL status
        run: npx tsx src/fetchStatus.ts
        env:
          TFL_APP_KEY: ${{ secrets.TFL_APP_KEY }}
      - name: Commit the new record
        run: |
          git config user.name "archive-bot"
          git config user.email "archive-bot@users.noreply.github.com"
          git add data
          git commit -m "status $(date -u +%FT%TZ) [skip ci]" || echo "nothing new"
          git push
