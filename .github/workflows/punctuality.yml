name: Punctuality model
on:
  workflow_dispatch: {}
  schedule:
    - cron: "17 3,9,15,21 * * *"
permissions:
  contents: write
jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npx tsx src/punctuality.ts
      - name: Commit the model
        run: |
          git config user.name "archive-bot"
          git config user.email "archive-bot@users.noreply.github.com"
          git add data/model/rail-reliability.json
          git commit -m "punctuality model rebuild" || exit 0
          for i in 1 2 3; do
            git push && break
            git pull --rebase -X theirs && continue
          done
